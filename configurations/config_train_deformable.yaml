dataloader: # training after MRI affine registration
  csv_loc:
    train: ... # TODO: Add path to CSV for training
    valid: ... # TODO: Add path to CSV for validation
  train:
    batch_size: 16 #24
  valid:
    batch_size: 16 #24

dataset:
  train:
    shuffle: True
    drop_last: True
    crop_96: True
  valid:
    shuffle: False
    drop_last: True
    
general:
  num_workers: 2

training:
  lr: 1e-5
  num_epochs: 150
  loss_function: LNCC
  hist_eq: False
  include_lowres: True

model:
  num_channel_initial: 16
  extract_levels: [0,1,2,3]

loss:
  LNCC:
    lam: 1
    kernel_size: 19
  GMI:
    lam: 0
  BE:     # bending energy
    lam: 10 

augmentation:
  apply: True
  affine: # no affine augmentation -> changed dataloader
    prob: 0
    translation:
      range:
      - -20.0
      - 20.0
    rotation:
      range:
      - -0.8
      - 0.8
  gaussian_noise:
    prob: 1
    mean: 0.0
    std: 0.01

  scale_intensity: 
    prob: 1
    factors:
    - -0.3
    - 0.3

  shift_intensity:
    prob: 1
    offsets:
    - -0.2
    - 0.2
  smooth:
    prob: 0

